<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Edit Note</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bulma.css">
  <link rel="stylesheet" href="assets/boxicon/fonts/basic/boxicons.css">
  <link rel="stylesheet" href="css/theme.css">



</head>

<body class="">
  <div class="container px-4 mt-5 pb-3">
    <div class="level is-mobile">
      <div class="level-left">
        <div class="level-item">
          <a href="index.html" class="button is-light">
            <i class='bx bx-arrow-to-left mr-2'></i>Back
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- toolbar -->
  <div class="toolbar-container is-flex is-justify-content-space-around my-2 mx-4">
    <div class="control">
      <button onclick="format('bold')" type="button" class="button is-small">
        <strong>B</strong>
      </button>
    </div>
    <div class="control">
      <button onclick="format('italic')" type="button" class="button is-small">
        <em>I</em>
      </button>
    </div>
    <div class="control">
      <button onclick="format('underline')" type="button" class="button is-small">
        <u>U</u>
      </button>
    </div>
    <div class="control">
      <button onclick="format('strikeThrough')" type="button" class="button is-small">
        <s>S</s>
      </button>
    </div>
    <div class="control">
      <button onclick="format('removeFormat')" type="button" class="button is-small p-2">
        <i class="bx bx-eraser"></i>
      </button>
    </div>
  </div>

  <div class="container px-4">
    
    <div class="editor-container mb-4">
      <input id="titleInput" placeholder="Title" class="input is-medium title mb-4" />
      <div class="">
        
      </div>
      <div id="textInput" contenteditable="true" class="editor-area p-4" data-placeholder="Tulis catatan...">
      </div>
    </div>
  </div>

  

  <script type="module" src="js/app.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/editor.js"></script>
</body>

</html>
